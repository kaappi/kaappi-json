name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build Kaappi
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi.git /tmp/kaappi
          cd /tmp/kaappi && zig build

      - name: Run tests
        run: /tmp/kaappi/zig-out/bin/kaappi --coverage-xml coverage.xml --lib-path lib tests/test-json.scm

      - name: Upload to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: kaappi/kaappi-json
          files: coverage.xml
          fail_ci_if_error: false
